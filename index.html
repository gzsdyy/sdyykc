<!DOCTYPE html>
 <html lang="zh-CN">
 <head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
     <title>药材库存明细表</title>
     <style>
         * {margin: 0;padding: 0;box-sizing: border-box;}
         html, body {
             height: 100vh;
             width: 100vw;
             overflow: hidden;
         }
         .wrap{
             width:100%;
             height:100%;
             /* 页面整体放大，解决字体小，1.1=放大10%、1.18=18% */
             transform: scale(1.18);
             transform-origin: 0 0;
         }
         iframe {
             width: calc(100% / 1.18);
             height: calc(100% / 1.18);
             border: none;
             display:block;
         }
     </style>
 </head>
 <body>
